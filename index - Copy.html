<!DOCTYPE html>
<html>
<head>
  <title>Virtual Letter</title>
  <style>
    body {
      background-color: #fbeaea;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .letter {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 400px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
    }
  </style>
</head>
<body>

<div class="letter">
  <h1>💌 A Letter For You</h1>

  <p>Dear Friend,</p>

  <p>
    Thank you for always being there for me.
    I hope this message makes you smile today.
  </p>

  <p>— Ken</p>
</div>

</body>
</html>
